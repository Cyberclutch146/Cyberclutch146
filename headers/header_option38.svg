<svg width="800" height="200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@600&amp;family=Share+Tech+Mono&amp;display=swap');
      .warp { animation: warp38 6s ease-in-out infinite alternate; transform-origin: 400px 100px; }
      @keyframes warp38 { 0% { transform: perspective(400px) rotateY(-8deg); } 100% { transform: perspective(400px) rotateY(8deg); } }
    </style>
    <linearGradient id="bg38" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#020c06"/>
      <stop offset="100%" stop-color="#001a0e"/>
    </linearGradient>
  </defs>
  <rect width="800" height="200" fill="url(#bg38)" rx="15"/>
  <g class="warp">
    <!-- grid lines horizontal -->
    <line x1="0" y1="50"  x2="800" y2="50"  stroke="#00ff8040" stroke-width="0.8"/>
    <line x1="0" y1="100" x2="800" y2="100" stroke="#00ff8040" stroke-width="0.8"/>
    <line x1="0" y1="150" x2="800" y2="150" stroke="#00ff8040" stroke-width="0.8"/>
    <!-- grid lines vertical -->
    <line x1="100" y1="0" x2="100" y2="200" stroke="#00ff8020" stroke-width="0.6"/>
    <line x1="200" y1="0" x2="200" y2="200" stroke="#00ff8020" stroke-width="0.6"/>
    <line x1="300" y1="0" x2="300" y2="200" stroke="#00ff8020" stroke-width="0.6"/>
    <line x1="400" y1="0" x2="400" y2="200" stroke="#00ff8030" stroke-width="0.8"/>
    <line x1="500" y1="0" x2="500" y2="200" stroke="#00ff8020" stroke-width="0.6"/>
    <line x1="600" y1="0" x2="600" y2="200" stroke="#00ff8020" stroke-width="0.6"/>
    <line x1="700" y1="0" x2="700" y2="200" stroke="#00ff8020" stroke-width="0.6"/>
  </g>
  <text x="400" y="90"  font-family="Fira Code" font-size="40" font-weight="600" fill="#00ff87" text-anchor="middle" dominant-baseline="middle">Swagata Ganguly</text>
  <text x="400" y="140" font-family="Share Tech Mono" font-size="18" fill="#86efac" text-anchor="middle" dominant-baseline="middle">Building AI Systems</text>
</svg>
