<svg width="800" height="200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;700&amp;family=Orbitron:wght@500;700&amp;family=Quicksand:wght@500;700&amp;display=swap');
      
      .star { fill: #fff; animation: twinkle 3s infinite ease-in-out alternate; }
      .star:nth-child(2n) { animation-delay: 0.5s; animation-duration: 4s; }
      .star:nth-child(3n) { animation-delay: 1.5s; animation-duration: 2s; }
      @keyframes twinkle { 0% { opacity: 0.2; transform: scale(0.8); } 100% { opacity: 1; transform: scale(1.2); } }
      .title, .subtitle { text-shadow: 0 0 10px rgba(255,255,255,0.3); }
    
    </style>
    
      <radialGradient id="spaceGrad" cx="50%" cy="50%" r="50%">
        <stop offset="0%" stop-color="#1B1B3A"/>
        <stop offset="100%" stop-color="#050510"/>
      </radialGradient>
    
  </defs>
  
      <rect width="100%" height="100%" fill="url(#spaceGrad)" rx="15" />
      <g opacity="0.8">
        <circle cx="100" cy="50" r="1.5" class="star" />
        <circle cx="250" cy="150" r="2" class="star" />
        <circle cx="600" cy="80" r="1" class="star" />
        <circle cx="720" cy="180" r="2.5" class="star" />
        <circle cx="380" cy="30" r="1.5" class="star" />
        <circle cx="50" cy="170" r="1" class="star" />
        <circle cx="680" cy="40" r="2" class="star" />
      </g>
    
  <text x="400" y="90" font-family="Orbitron" font-size="44" font-weight="700" fill="#fff" text-anchor="middle" dominant-baseline="middle" class="title">Swagata Ganguly</text>
  <text x="400" y="140" font-family="Quicksand" font-size="20" font-weight="400" fill="#A0AEC0" text-anchor="middle" dominant-baseline="middle" class="subtitle">Building AI Systems</text>
</svg>