<svg width="1000" height="180" viewBox="0 0 1000 180" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;700&amp;display=swap');
      .name { font-family: 'Outfit', sans-serif; font-weight: 700; font-size: 46px; fill: #e2e8f0; text-anchor: middle; }
      .desc { font-family: 'Outfit', sans-serif; font-weight: 300; font-size: 16px; fill: #94a3b8; text-anchor: middle; }
      @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
      .geo { fill: none; stroke: rgba(255,255,255,0.05); stroke-width: 1; transform-origin: center; animation: rotate 30s linear infinite;}
    </style>
  </defs>
  <rect width="1000" height="180" fill="#0f172a"/>
  
  <g transform="translate(500, 90)">
    <circle r="150" class="geo" stroke-dasharray="10 5"/>
    <circle r="200" class="geo" stroke-dasharray="5 20"/>
    <rect x="-100" y="-100" width="200" height="200" class="geo" style="animation-duration: 20s;"/>
    <rect x="-150" y="-150" width="300" height="300" class="geo" style="animation-duration: 25s; animation-direction: reverse;"/>
  </g>

  <rect width="1000" height="180" fill="url(#grad)" opacity="0.5"/>
  <text x="500" y="85" class="name">Swagata Ganguly</text>
  <text x="500" y="125" class="desc">Building AI Systems &amp; Real-world Solutions</text>
</svg>
