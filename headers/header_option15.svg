<svg width="800" height="200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;700&amp;family=Orbitron:wght@500;700&amp;family=Quicksand:wght@500;700&amp;display=swap');
      
      .hex { stroke: rgba(0, 255, 255, 0.2); stroke-width: 2; fill: none; transform-origin: center; animation: pulseHex 4s infinite linear; }
      .hex:nth-child(even) { stroke: rgba(255, 0, 255, 0.2); animation-direction: reverse; }
      @keyframes pulseHex { 0% { opacity: 0.3; transform: scale(1); } 50% { opacity: 0.8; transform: scale(1.05); } 100% { opacity: 0.3; transform: scale(1); } }
    
    </style>
    <linearGradient id="bgHex" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#0a0a0a"/><stop offset="100%" stop-color="#111"/></linearGradient>
  </defs>
  
      <rect width="100%" height="100%" fill="url(#bgHex)" rx="15" />
      <g transform="translate(100, 50)"><polygon points="30,0 60,17 60,52 30,69 0,52 0,17" class="hex" /></g>
      <g transform="translate(650, 120)"><polygon points="30,0 60,17 60,52 30,69 0,52 0,17" class="hex" /></g>
      <g transform="translate(200, 150) scale(0.6)"><polygon points="30,0 60,17 60,52 30,69 0,52 0,17" class="hex" /></g>
      <g transform="translate(550, -10) scale(1.2)"><polygon points="30,0 60,17 60,52 30,69 0,52 0,17" class="hex" /></g>
    
  <text x="400" y="90" font-family="Orbitron" font-size="44" font-weight="700" fill="#0ff" text-anchor="middle" dominant-baseline="middle" class="title">Swagata Ganguly</text>
  <text x="400" y="140" font-family="Fira Code" font-size="20" font-weight="400" fill="#f0f" text-anchor="middle" dominant-baseline="middle" class="subtitle">Building AI Systems</text>
</svg>