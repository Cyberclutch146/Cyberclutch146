<svg width="1000" height="180" viewBox="0 0 1000 180" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;700&amp;display=swap');
      .name { font-family: 'Outfit', sans-serif; font-weight: 700; font-size: 50px; fill: #ffffff; text-anchor: middle; }
      .desc { font-family: 'Outfit', sans-serif; font-weight: 300; font-size: 18px; fill: #cbd5e1; text-anchor: middle; letter-spacing: 1px;}
      @keyframes float1 { 0%, 100% { transform: translate(0, 0); } 50% { transform: translate(30px, -20px); } }
      @keyframes float2 { 0%, 100% { transform: translate(0, 0); } 50% { transform: translate(-30px, 20px); } }
      .orb1 { animation: float1 10s ease-in-out infinite; }
      .orb2 { animation: float2 12s ease-in-out infinite; }
    </style>
    <filter id="blur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="30"/>
    </filter>
  </defs>
  <rect width="1000" height="180" fill="#020617"/>
  <circle cx="200" cy="90" r="60" fill="#3b82f6" opacity="0.4" filter="url(#blur)" class="orb1"/>
  <circle cx="800" cy="90" r="80" fill="#8b5cf6" opacity="0.4" filter="url(#blur)" class="orb2"/>
  <circle cx="500" cy="90" r="50" fill="#06b6d4" opacity="0.3" filter="url(#blur)" class="orb1"/>
  
  <rect width="1000" height="180" fill="rgba(255,255,255,0.03)" style="backdrop-filter: blur(10px);"/>
  
  <text x="500" y="90" class="name">Swagata Ganguly</text>
  <text x="500" y="130" class="desc">Building AI Systems &amp; Real-world Solutions</text>
</svg>
