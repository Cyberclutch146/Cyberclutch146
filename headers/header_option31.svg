<svg width="800" height="200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;600&amp;display=swap');
      .cursor { animation: blink31 1s step-start infinite; }
      @keyframes blink31 { 50% { opacity: 0; } }
      .scanline { opacity: 0.03; animation: scan 4s linear infinite; }
      @keyframes scan { 0% { transform: translateY(-200px); } 100% { transform: translateY(200px); } }
    </style>
    <linearGradient id="bg31" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#011710"/>
      <stop offset="100%" stop-color="#000d08"/>
    </linearGradient>
  </defs>
  <rect width="800" height="200" fill="url(#bg31)" rx="15"/>
  <!-- scanline overlay -->
  <rect width="800" height="8" fill="#00ff00" class="scanline"/>
  <!-- top bar -->
  <rect x="0" y="0" width="800" height="28" fill="#001a0e" rx="15"/>
  <circle cx="22" cy="14" r="6" fill="#ff5f56"/>
  <circle cx="42" cy="14" r="6" fill="#ffbd2e"/>
  <circle cx="62" cy="14" r="6" fill="#27c93f"/>
  <text x="400" y="14" font-family="Fira Code" font-size="11" fill="#3a5c42" text-anchor="middle" dominant-baseline="middle">~ swagata — bash</text>
  <!-- prompt -->
  <text x="50" y="80"  font-family="Fira Code" font-size="15" fill="#4ade80">user@dev</text>
  <text x="140" y="80" font-family="Fira Code" font-size="15" fill="#64748b">:</text>
  <text x="150" y="80" font-family="Fira Code" font-size="15" fill="#60a5fa">~/portfolio</text>
  <text x="242" y="80" font-family="Fira Code" font-size="15" fill="#fff">$</text>
  <!-- main name -->
  <text x="50" y="118" font-family="Fira Code" font-size="38" font-weight="600" fill="#00ff87">Swagata Ganguly</text>
  <rect x="522" y="98" width="22" height="32" fill="#00ff87" class="cursor"/>
  <!-- subtitle -->
  <text x="50" y="160" font-family="Fira Code" font-size="16" fill="#64748b">// Building AI Systems</text>
</svg>
