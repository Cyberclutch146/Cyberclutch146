<svg width="800" height="200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;700&amp;display=swap');
      .floater { animation: float30 8s ease-in-out infinite alternate; }
      .f1 { animation-delay: 0s; }
      .f2 { animation-delay: -3s; }
      @keyframes float30 { 0% { transform: translate(0,0); } 100% { transform: translate(20px,-15px); } }
    </style>
    <filter id="blur30"><feGaussianBlur stdDeviation="25"/></filter>
    <clipPath id="roundClip"><rect width="800" height="200" rx="15"/></clipPath>
  </defs>
  <rect width="800" height="200" fill="#0c0a18" rx="15"/>
  <g clip-path="url(#roundClip)">
    <g filter="url(#blur30)" opacity="0.8">
      <circle cx="180" cy="80"  r="120" fill="#6366f1" class="floater f1"/>
      <circle cx="620" cy="120" r="140" fill="#ec4899" class="floater f2"/>
    </g>
    <!-- glass panel -->
    <rect x="40" y="30" width="720" height="140" rx="12" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
  </g>
  <text x="400" y="90"  font-family="Outfit" font-size="46" font-weight="700" fill="#fff" text-anchor="middle" dominant-baseline="middle">Swagata Ganguly</text>
  <text x="400" y="140" font-family="Outfit" font-size="19" font-weight="300" fill="rgba(255,255,255,0.7)" text-anchor="middle" dominant-baseline="middle">Building AI Systems</text>
</svg>
