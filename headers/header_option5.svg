<svg width="1000" height="180" viewBox="0 0 1000 180" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&amp;display=swap');
      .name { font-family: 'Share Tech Mono', monospace; font-size: 46px; fill: #22c55e; text-anchor: middle; }
      .desc { font-family: 'Share Tech Mono', monospace; font-size: 18px; fill: #4ade80; text-anchor: middle; opacity:0.8;}
      .drop { font-family: 'Share Tech Mono', monospace; fill: #22c55e; font-size:14px; animation: fall linear infinite; opacity: 0; }
      @keyframes fall { 0% { transform: translateY(-20px); opacity:1;} 80% { opacity:0.5;} 100% { transform: translateY(200px); opacity:0;} }
    </style>
  </defs>
  <rect width="1000" height="180" fill="#020617"/>
  <g opacity="0.3">
    <!-- Simulated matrix rain -->
    <text x="100" y="0" class="drop" style="animation-duration: 2s; animation-delay: 0s;">0 1 0 1</text>
    <text x="200" y="0" class="drop" style="animation-duration: 3s; animation-delay: 0.5s;">1 0 1 1</text>
    <text x="300" y="0" class="drop" style="animation-duration: 2.5s; animation-delay: 1s;">0 0 1 0</text>
    <text x="700" y="0" class="drop" style="animation-duration: 2.8s; animation-delay: 0.2s;">1 1 0 0</text>
    <text x="800" y="0" class="drop" style="animation-duration: 3.2s; animation-delay: 0.8s;">0 1 0 1</text>
    <text x="900" y="0" class="drop" style="animation-duration: 2.1s; animation-delay: 1.5s;">1 1 1 0</text>
  </g>
  <rect width="400" height="100" x="300" y="40" fill="#020617" opacity="0.9" rx="10" stroke="#22c55e" stroke-width="2"/>
  <text x="500" y="85" class="name">Swagata Ganguly</text>
  <text x="500" y="120" class="desc">Building AI Systems &amp; Real-world Solutions</text>
</svg>
