<svg width="800" height="200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@600&amp;family=Quicksand:wght@500&amp;display=swap');
      .tri { fill-opacity: 0.15; stroke-opacity: 0.4; stroke-width: 1; animation: rotate 20s linear infinite; }
      .t1 { transform-origin: 100px 100px; stroke: #f59e0b; fill: #f59e0b; animation-direction: normal; }
      .t2 { transform-origin: 700px 100px; stroke: #ec4899; fill: #ec4899; animation-direction: reverse; }
      .t3 { transform-origin: 400px 100px; stroke: #8b5cf6; fill: #8b5cf6; animation-duration: 30s; }
      @keyframes rotate { to { transform: rotate(360deg); } }
    </style>
    <linearGradient id="bg27" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#18181b"/>
      <stop offset="100%" stop-color="#09090b"/>
    </linearGradient>
  </defs>
  <rect width="800" height="200" fill="url(#bg27)" rx="15"/>
  <polygon points="100,20 160,120 40,120" class="tri t1"/>
  <polygon points="700,20 760,120 640,120" class="tri t2"/>
  <polygon points="400,10 460,110 340,110" class="tri t3"/>
  <polygon points="100,80 160,180 40,180" class="tri t1" style="animation-duration:25s"/>
  <polygon points="700,80 760,180 640,180" class="tri t2" style="animation-duration:15s"/>
  <text x="400" y="90" font-family="Outfit" font-size="44" font-weight="600" fill="#fafafa" text-anchor="middle" dominant-baseline="middle">Swagata Ganguly</text>
  <text x="400" y="140" font-family="Quicksand" font-size="19" fill="#a1a1aa" text-anchor="middle" dominant-baseline="middle">Building AI Systems</text>
</svg>
