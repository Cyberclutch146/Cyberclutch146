<svg width="800" height="200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Quicksand:wght@700&amp;family=Outfit:wght@400&amp;display=swap');
      .shimmer { animation: shimmer37 3s linear infinite; }
      @keyframes shimmer37 { 0% { transform: translateX(-800px); } 100% { transform: translateX(800px); } }
    </style>
    <linearGradient id="bg37" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fdf4ff"/>
      <stop offset="100%" stop-color="#f0f9ff"/>
    </linearGradient>
    <linearGradient id="shim37" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="transparent"/>
      <stop offset="50%" stop-color="rgba(255,255,255,0.7)"/>
      <stop offset="100%" stop-color="transparent"/>
    </linearGradient>
  </defs>
  <rect width="800" height="200" fill="url(#bg37)" rx="15" stroke="#e9d5ff" stroke-width="1.5"/>
  <rect width="800" height="200" fill="url(#shim37)" rx="15" class="shimmer"/>
  <!-- decorative circles -->
  <circle cx="80" cy="100" r="50" fill="none" stroke="#c084fc" stroke-width="1" opacity="0.4"/>
  <circle cx="720" cy="100" r="50" fill="none" stroke="#38bdf8" stroke-width="1" opacity="0.4"/>
  <text x="400" y="90"  font-family="Quicksand" font-size="44" font-weight="700" fill="#1e1b4b" text-anchor="middle" dominant-baseline="middle">Swagata Ganguly</text>
  <text x="400" y="140" font-family="Outfit" font-size="19" fill="#6366f1" text-anchor="middle" dominant-baseline="middle">Building AI Systems</text>
</svg>
