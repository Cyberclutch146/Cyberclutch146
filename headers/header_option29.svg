<svg width="800" height="200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&amp;family=Orbitron:wght@600&amp;display=swap');
      .trace { stroke: #00ff87; stroke-width: 1.5; fill: none; stroke-dasharray: 200; animation: pulse 4s linear infinite; opacity: 0.5; }
      .trace:nth-child(2n) { stroke: #00cfff; animation-delay: -2s; }
      .node { fill: #00ff87; animation: blink 2s ease-in-out infinite alternate; }
      @keyframes pulse { 0% { stroke-dashoffset: 400; } 100% { stroke-dashoffset: 0; } }
      @keyframes blink { 0% { opacity: 0.3; r: 3; } 100% { opacity: 1; r: 5; } }
    </style>
    <linearGradient id="bg29" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#011208"/>
      <stop offset="100%" stop-color="#020d0d"/>
    </linearGradient>
  </defs>
  <rect width="800" height="200" fill="url(#bg29)" rx="15"/>
  <!-- traces -->
  <path d="M 30 30 H 120 V 80 H 200 V 50 H 320 V 170 H 480 V 100 H 600 V 50 H 770" class="trace"/>
  <path d="M 30 170 H 150 V 120 H 250 V 170 H 400 V 80 H 500 V 150 H 770" class="trace"/>
  <path d="M 30 100 H 100 V 160 H 180 V 100 H 770" class="trace"/>
  <!-- nodes -->
  <circle cx="120" cy="30"  r="4" class="node"/>
  <circle cx="320" cy="50"  r="4" class="node"/>
  <circle cx="600" cy="50"  r="4" class="node"/>
  <circle cx="250" cy="120" r="4" class="node"/>
  <circle cx="500" cy="150" r="4" class="node"/>
  <text x="400" y="90"  font-family="Orbitron" font-size="38" font-weight="600" fill="#00ff87" text-anchor="middle" dominant-baseline="middle" opacity="0.95">Swagata Ganguly</text>
  <text x="400" y="138" font-family="Share Tech Mono" font-size="18" fill="#00cfff" text-anchor="middle" dominant-baseline="middle">Building AI Systems</text>
</svg>
