<svg width="800" height="200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;700&amp;family=Orbitron:wght@500;700&amp;family=Quicksand:wght@500;700&amp;display=swap');
      
      .ui-elem { stroke: #fbbf24; fill: none; stroke-width: 2; }
      .rotate { transform-origin: 400px 100px; animation: spin 10s infinite linear; }
      @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
      .blink { animation: blinker 1.5s infinite step-start; }
      @keyframes blinker { 50% { opacity: 0; } }
    
    </style>
    
  </defs>
  
      <rect width="100%" height="100%" fill="#111827" rx="15" />
      <path d="M 50 20 L 20 20 L 20 50" class="ui-elem" />
      <path d="M 750 20 L 780 20 L 780 50" class="ui-elem" />
      <path d="M 50 180 L 20 180 L 20 150" class="ui-elem" />
      <path d="M 750 180 L 780 180 L 780 150" class="ui-elem" />
      <circle cx="400" cy="100" r="150" class="ui-elem rotate" stroke-dasharray="10 30" opacity="0.3" />
      <text x="35" y="165" fill="#fbbf24" font-family="Fira Code" font-size="10" class="blink">SYS.ON</text>
    
  <text x="400" y="90" font-family="Orbitron" font-size="44" font-weight="700" fill="#fff" text-anchor="middle" dominant-baseline="middle" class="title">Swagata Ganguly</text>
  <text x="400" y="140" font-family="Fira Code" font-size="20" font-weight="400" fill="#fbbf24" text-anchor="middle" dominant-baseline="middle" class="subtitle">Building AI Systems</text>
</svg>