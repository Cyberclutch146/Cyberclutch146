      @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&amp;family=Lato:wght@300&amp;display=swap');
      .name { font-family: 'Playfair Display', serif; font-size: 46px; fill: #1e293b; text-anchor: middle; }
      .desc { font-family: 'Lato', sans-serif; font-size: 16px; fill: #64748b; text-anchor: middle; letter-spacing: 3px; text-transform: uppercase;}
      .line { stroke: #cbd5e1; stroke-width: 1; }
    </style>
  </defs>
  <rect width="1000" height="180" fill="#ffffff"/>
