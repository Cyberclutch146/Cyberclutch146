<svg width="1000" height="180" viewBox="0 0 1000 180" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Anton&amp;family=Inter:wght@400&amp;display=swap');
      .name { font-family: 'Inter', sans-serif; font-size: 40px; fill: #000; text-anchor: middle; font-weight: bold;}
      .desc { font-family: 'Inter', sans-serif; font-size: 14px; fill: #555; text-anchor: middle; }
      .marquee { font-family: 'Anton', sans-serif; font-size: 140px; fill: rgba(0,0,0,0.03); white-space: nowrap; }
      @keyframes slideText { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }
      .slide { animation: slideText 20s linear infinite; }
    </style>
  </defs>
  <rect width="1000" height="180" fill="#f8fafc"/>
  <g transform="translate(0, 140)">
    <text x="0" y="0" class="marquee slide">DEVELOPER ENGINEER CREATOR DEVELOPER ENGINEER CREATOR</text>
  </g>
  <text x="500" y="90" class="name">Swagata Ganguly</text>
  <text x="500" y="120" class="desc">Building AI Systems &amp; Real-world Solutions</text>
</svg>
