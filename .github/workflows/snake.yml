name: Generate Snake

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Generate Final Boss Snake
        uses: Platane/snk@v3
        with:
          github_user_name: Cyberclutch146
          outputs: |
            dist/github-snake-dark.svg?palette=github-dark&color_snake=#00ffff&color_dots=#334155,#475569,#64748b,#8A2BE2,#22d3ee,#ffffff
            dist/github-snake-light.svg?palette=github-light&color_snake=#2563eb&color_dots=#ffffff,#e2e8f0,#cbd5f5,#818cf8,#2563eb

      - name: Push to output branch
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: output
          publish_dir: dist
