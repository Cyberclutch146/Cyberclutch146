<svg width="1000" height="120" viewBox="0 0 1000 120" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Anton&amp;family=Inter:wght@700&amp;display=swap');
      .text { font-family: 'Inter', sans-serif; font-size: 24px; fill: #000; text-anchor: middle; font-weight: bold;}
      .marquee { font-family: 'Anton', sans-serif; font-size: 100px; fill: rgba(0,0,0,0.03); white-space: nowrap; }
      @keyframes slideText { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }
      .slide { animation: slideText 20s linear infinite; }
    </style>
  </defs>
  <rect width="1000" height="120" fill="#f8fafc"/>
  <g transform="translate(0, 100)">
    <text x="0" y="0" class="marquee slide">KEEP BUILDING KEEP BUILDING KEEP BUILDING KEEP BUILDING</text>
  </g>
  <text x="500" y="65" class="text">Keep Building</text>
</svg>
