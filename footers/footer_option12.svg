<svg width="1000" height="120" viewBox="0 0 1000 120" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;700&amp;display=swap');
      .text { font-family: 'Outfit', sans-serif; font-weight: 700; font-size: 26px; fill: #e2e8f0; text-anchor: middle; }
      @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
      .geo { fill: none; stroke: rgba(255,255,255,0.05); stroke-width: 1; transform-origin: center; animation: rotate 30s linear infinite;}
    </style>
  </defs>
  <rect width="1000" height="120" fill="#0f172a"/>
  <g transform="translate(500, 60)">
    <circle r="100" class="geo" stroke-dasharray="10 5"/>
    <rect x="-80" y="-80" width="160" height="160" class="geo" style="animation-duration: 20s;"/>
  </g>
  <text x="500" y="68" class="text">Keep Building</text>
</svg>
