<svg width="800" height="120" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;700&amp;family=Orbitron:wght@500;700&amp;family=Quicksand:wght@500;700&amp;display=swap');
      
      .bar { fill: #10b981; opacity: 0.7; animation: stream 2s infinite linear; }
      .bar:nth-child(odd) { fill: #3b82f6; animation-duration: 3s; animation-direction: reverse; }
      @keyframes stream { 0% { stroke-dashoffset: 200; } 100% { stroke-dashoffset: 0; } }
      .title { letter-spacing: 2px; }
    
    </style>
    <linearGradient id="bgData" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#0f172a"/><stop offset="100%" stop-color="#1e293b"/></linearGradient>
  </defs>
  
      <rect width="100%" height="100%" fill="url(#bgData)" rx="15" />
      <g stroke-dasharray="20 40" stroke-width="4" stroke="#10b981" class="bar">
        <line x1="0" y1="30" x2="800" y2="30" />
        <line x1="0" y1="170" x2="800" y2="170" stroke="#3b82f6" />
      </g>
    
  <text x="400" y="60" font-family="Fira Code" font-size="18" font-weight="500" fill="#8892b0" text-anchor="middle" dominant-baseline="middle" class="footer-text">Let's build the future together</text>
</svg>