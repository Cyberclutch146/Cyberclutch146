<svg width="800" height="120" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;700&amp;family=Orbitron:wght@500;700&amp;family=Quicksand:wght@500;700&amp;display=swap');
      
      .cloud { fill: #f1f5f9; animation: drift 20s infinite linear; }
      @keyframes drift { 0% { transform: translateX(-100px); } 100% { transform: translateX(800px); } }
      .title { fill: #0f172a; }
      .subtitle { fill: #475569; }
      .footer-text { fill: #64748b; }
    
    </style>
    <linearGradient id="lightBg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#ffffff"/><stop offset="100%" stop-color="#e2e8f0"/></linearGradient>
  </defs>
  
      <rect width="100%" height="100%" fill="url(#lightBg)" rx="15" stroke="#cbd5e1" stroke-width="1" />
      <circle cx="0" cy="50" r="40" class="cloud" style="animation-delay: -5s;" />
      <circle cx="0" cy="150" r="60" class="cloud" style="animation-delay: -15s; opacity: 0.6;" />
      <circle cx="0" cy="100" r="30" class="cloud" style="animation-delay: -10s; opacity: 0.8;" />
    
  <text x="400" y="60" font-family="Quicksand" font-size="18" font-weight="500" fill="#0f172a" text-anchor="middle" dominant-baseline="middle" class="footer-text">Let's build the future together</text>
</svg>