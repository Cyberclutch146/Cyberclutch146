<svg width="1000" height="120" viewBox="0 0 1000 120" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700&amp;display=swap');
      .text { font-family: 'Orbitron', sans-serif; font-size: 24px; fill: #fff; text-anchor: middle; text-shadow: 0 0 10px #0ea5e9;}
      @keyframes dash { to { stroke-dashoffset: 0; } }
      .line { fill: none; stroke: #0ea5e9; stroke-width: 2; stroke-dasharray: 500; stroke-dashoffset: 500; animation: dash 3s ease-in-out infinite alternate; }
    </style>
  </defs>
  <rect width="1000" height="120" fill="#020617"/>
  <path d="M 100 60 L 350 60 L 400 30 L 600 30 L 650 60 L 900 60" class="line" opacity="0.3"/>
  <text x="500" y="68" class="text">Keep Building</text>
</svg>
