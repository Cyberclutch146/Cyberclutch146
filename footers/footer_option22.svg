<svg width="800" height="120" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;700&amp;family=Orbitron:wght@500;700&amp;family=Quicksand:wght@500;700&amp;display=swap');
      
      .wave { fill: none; stroke-width: 2; animation: waveAnim 4s infinite linear; }
      .w1 { stroke: #a855f7; opacity: 0.7; }
      .w2 { stroke: #3b82f6; opacity: 0.5; animation-duration: 3s; animation-direction: reverse; }
      @keyframes waveAnim { 0% { stroke-dashoffset: 0; } 100% { stroke-dashoffset: 400; } }
    
    </style>
    
  </defs>
  
      <rect width="100%" height="100%" fill="#020617" rx="15" />
      <path d="M 0 100 Q 200 0 400 100 T 800 100" class="wave w1" stroke-dasharray="400" />
      <path d="M 0 100 Q 200 200 400 100 T 800 100" class="wave w2" stroke-dasharray="400" />
    
  <text x="400" y="60" font-family="Quicksand" font-size="18" font-weight="500" fill="#f8fafc" text-anchor="middle" dominant-baseline="middle" class="footer-text">Let's build the future together</text>
</svg>